name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: vhsify-macos-aarch64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: vhsify-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: vhsify-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dav1d (macOS)
        if: startsWith(matrix.os, 'macos')
        run: brew install dav1d

      - name: Install dav1d (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libdav1d-dev

      - name: Install dav1d (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          vcpkg install dav1d:x64-windows-static-md
          choco install pkgconfiglite --yes
          echo "PKG_CONFIG_PATH=C:/vcpkg/installed/x64-windows-static-md/lib/pkgconfig" >> $env:GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C target/${{ matrix.target }}/release vhsify

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path target\${{ matrix.target }}\release\vhsify.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifact }}.*

  update-homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download release assets
        run: |
          VERSION="${GITHUB_REF_NAME}"
          curl -sL "https://github.com/oborodice/vhsify/releases/download/${VERSION}/vhsify-macos-aarch64.tar.gz" -o vhsify-macos-aarch64.tar.gz
          curl -sL "https://github.com/oborodice/vhsify/releases/download/${VERSION}/vhsify-linux-x86_64.tar.gz" -o vhsify-linux-x86_64.tar.gz
          echo "SHA_ARM=$(sha256sum vhsify-macos-aarch64.tar.gz | awk '{print $1}')" >> $GITHUB_ENV
          echo "SHA_LINUX=$(sha256sum vhsify-linux-x86_64.tar.gz | awk '{print $1}')" >> $GITHUB_ENV
          echo "VERSION=${VERSION#v}" >> $GITHUB_ENV

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/oborodice/homebrew-tap.git
          python3 .github/homebrew/update_formula.py
          cd homebrew-tap
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add Formula/vhsify.rb
          git commit -m "chore: update vhsify to v${VERSION}"
          git push
