name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: vhsify-macos-aarch64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: vhsify-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: vhsify-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dav1d (macOS)
        if: startsWith(matrix.os, 'macos')
        run: brew install dav1d

      - name: Install dav1d (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libdav1d-dev

      - name: Install dav1d (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          vcpkg install dav1d:x64-windows-static-md
          choco install pkgconfiglite --yes
          echo "PKG_CONFIG_PATH=C:/vcpkg/installed/x64-windows-static-md/lib/pkgconfig" >> $env:GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C target/${{ matrix.target }}/release vhsify

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path target\${{ matrix.target }}\release\vhsify.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifact }}.*
